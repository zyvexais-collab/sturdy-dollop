<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Migraine Helper</title>
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.webmanifest">
</head>

<body>

<div class="app">

<h1>🌸 Migraine Helper</h1>

<div class="nav">
<button onclick="show('home')">Home</button>
<button onclick="show('log')">Log</button>
<button onclick="show('attack')">Attack</button>
<button onclick="show('daily')">Daily</button>
</div>

<div id="home" class="screen active">
<div class="card">
<h2>✨ Today, little one</h2>
<p id="todayStats"></p>
</div>

<div class="card">
<h2>💜 Daily Progress</h2>
<p id="dailyStats"></p>
</div>
</div>

<div id="log" class="screen">
<div class="card">
<h2>Log Migraine</h2>

<input type="date" id="date">
<select id="hadMigraine">
<option value="yes">Migraine</option>
<option value="no">No Migraine</option>
</select>

<input type="number" id="severity" placeholder="Severity (1-10)">
<input type="text" id="trigger" placeholder="Trigger">
<textarea id="notes" placeholder="Notes"></textarea>

<button onclick="saveLog()">Save</button>
<button onclick="exportLogs()">Export</button>
<button onclick="clearLogs()">Clear All</button>

<div id="logs"></div>
</div>
</div>

<div id="attack" class="screen">
<div class="card">
<h2>💥 Attack Mode</h2>

<label><input type="checkbox"> Drink water</label>
<label><input type="checkbox"> Small caffeine</label>
<label><input type="checkbox"> Ice pack</label>
<label><input type="checkbox"> Dark room</label>
<label><input type="checkbox"> Rest eyes</label>

<button onclick="startTimer()">Start 20 min timer</button>
<p id="timer"></p>

<p class="tip">🔕 Turn on Do Not Disturb manually</p>
</div>
</div>

<div id="daily" class="screen">
<div class="card">
<h2>🌼 Daily Routine for little one</h2>

<label><input type="checkbox" class="daily"> Morning water</label>

<label><input type="checkbox" class="daily"> ADHD meds</label>
<label><input type="checkbox" class="daily"> Vitamin B2</label>
<label><input type="checkbox" class="daily"> Coenzyme Q10</label>
<label><input type="checkbox" class="daily"> Morning walk</label>

<label><input type="checkbox" class="daily"> Breakfast</label>
<label><input type="checkbox" class="daily"> Caffeine around 10 AM</label>
<label><input type="checkbox" class="daily"> Lunch</label>
<label><input type="checkbox" class="daily"> Dinner</label>
<label><input type="checkbox" class="daily"> Topiramate at night</label>
<label><input type="checkbox" class="daily"> Magnesium at night</label>

</div>
</div>

</div>

<script src="app.js"></script>
</body>
</html>
